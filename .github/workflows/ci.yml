name: SideLab CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt black isort ruff pytest pytest-cov mypy pip-audit
        
    - name: Lint and Format
      run: |
        black --check .
        isort --check .
        ruff check .
        
    - name: Type check
      run: |
        mypy sidelab/
        
    - name: Security audit
      run: |
        pip-audit --desc
        
    - name: Run tests with coverage
      run: |
        pytest -m "not live"
